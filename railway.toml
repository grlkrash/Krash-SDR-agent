# SSA web service — Railway config-as-code.
# Cron service: duplicate this repo in Railway, set startCommand to `npm run start:cron`
# and cronSchedule to `*/5 * * * *`. See RAILWAY.md.

[build]
builder = "NIXPACKS"
# Nixpacks already runs npm ci; omit npm install to avoid duplicate installs.
# DATABASE_URL may be unset at build time — prisma.config.ts uses a placeholder for generate.
buildCommand = "npx prisma generate && npm run build && npx playwright install --with-deps chromium"

[deploy]
startCommand = "npm run start:web"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
